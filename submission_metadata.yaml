# Redrob Hackathon — Submission Metadata Template
#
# Copy this file to your repo root as `submission_metadata.yaml` and fill it in.
# The fields here should match what you submit via the portal at upload time.
# Stage 3 review uses this file to verify your portal metadata.

# ============================================================================
# Team identity
# ============================================================================
team_name: "ronak-ravtode"  # Confirm this matches your registered team name.

primary_contact:
  name: "ronak-ravtode"          # Confirm this matches your portal identity.
  email: "ronakravtode001@gmail.com"   # Used for all organizer communication
  phone: "+91-XXXXXXXXXX"        # Used for top-50 / top-10 outreach

team_members:
  - name: "ronak-ravtode"
    email: "ronakravtode001@gmail.com"
    role: "Lead Engineer"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/ronak-ravtode/redrob-ranker"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/ronak-ravtode/redrob-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./redrob_submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows 11 workstation"      # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 12                                 # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.14.3"                      # python --version
  os: "Windows-11-10.0.26200-SP0"               # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "OpenCode / gpt-5.5"

ai_usage_summary: |
  Used OpenCode / gpt-5.5 for implementation, code review, test generation,
  documentation and adversarial release review. Ranking itself is deterministic,
  CPU-only and offline; no hosted LLM or API is called during ranking.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Deterministic rule-based ranker that streams JSONL profiles and prioritizes
  career-history evidence for ranking, retrieval, recommendation, matching,
  vector/search infrastructure, production ownership and evaluation. Skill lists
  and profile summaries are supporting signals only. High-confidence integrity
  anomalies are excluded before ranking. Behavioural, notice and location signals
  are bounded modifiers. Explanations are generated from the same evidence used
  for scoring. Full ranking on the supplied 100K dataset runs in about 11.36s on
  CPU with about 26.62 MB peak process working set in the measured environment.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
